<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #5a67d8;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .status {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
            height: 30px;
        }

        .timer-circle {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 40px;
            background: #f7fafc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .timer-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #e2e8f0;
            transition: transform 0.3s ease;
        }

        .timer-circle.working::before {
            border-color: #48bb78;
            transform: scale(0.95);
        }

        .timer-circle.short-break::before {
            border-color: #4299e1;
            transform: scale(0.95);
        }

        .timer-circle.long-break::before {
            border-color: #9f7aea;
            transform: scale(0.95);
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 300;
            color: #2d3748;
            z-index: 1;
        }

        .progress-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .progress-ring circle {
            fill: transparent;
            stroke: #48bb78;
            stroke-width: 8;
            stroke-linecap: round;
            transform: rotate(-90deg);
            transform-origin: center;
            transition: stroke-dashoffset 1s linear;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start {
            background: #48bb78;
            color: white;
        }

        .btn-start:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-pause {
            background: #f6ad55;
            color: white;
        }

        .btn-pause:hover {
            background: #ed8936;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(246, 173, 85, 0.4);
        }

        .btn-reset {
            background: #e53e3e;
            color: white;
        }

        .btn-reset:hover {
            background: #c53030;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 62, 62, 0.4);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #5a67d8;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #718096;
            margin-top: 5px;
        }

        .settings {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
        }

        .settings h3 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .time-settings {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .time-setting {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-setting label {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .time-setting input {
            width: 60px;
            padding: 5px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 1rem;
        }

        .save-settings {
            background: #5a67d8;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .save-settings:hover {
            background: #4c51bf;
        }

        /* 庆祝动画容器 */
        .celebration-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 1;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 烟花效果 */
        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: firework-explode 1.5s ease-out forwards;
        }

        @keyframes firework-explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(20);
                opacity: 0;
            }
        }

        /* 成功提示框 */
        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .success-modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            max-width: 400px;
            width: 90%;
        }

        .success-modal.show .success-content {
            transform: scale(1);
        }

        .success-icon {
            font-size: 4rem;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .success-title {
            color: #48bb78;
            font-size: 2rem;
            margin: 20px 0 10px;
        }

        .success-message {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .success-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .success-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        /* 星星闪烁效果 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1500;
        }

        .star {
            position: absolute;
            font-size: 2rem;
            animation: twinkle 0.5s ease-in-out forwards;
        }

        @keyframes twinkle {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 0; }
        }

        /* 脉冲动画 */
        .pulse {
            animation: pulse 0.5s ease-in-out 3;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .timer-display {
                font-size: 2.5rem;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 200px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 番茄钟</h1>
        <div class="status" id="status">准备开始工作</div>

        <div class="timer-circle" id="timerCircle">
            <svg class="progress-ring" width="250" height="250">
                <circle cx="125" cy="125" r="115" stroke-dasharray="723" stroke-dashoffset="0"></circle>
            </svg>
            <div class="timer-display" id="timerDisplay">25:00</div>
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startTimer()">开始</button>
            <button class="btn-pause" id="pauseBtn" onclick="pauseTimer()" style="display: none;">暂停</button>
            <button class="btn-reset" id="resetBtn" onclick="resetTimer()">重置</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="pomodoroCount">0</div>
                <div class="stat-label">番茄钟</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="focusTime">0</div>
                <div class="stat-label">专注分钟</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="breakTime">0</div>
                <div class="stat-label">休息分钟</div>
            </div>
        </div>

        <div class="settings">
            <h3>设置</h3>
            <div class="time-settings">
                <div class="time-setting">
                    <label>工作时间</label>
                    <input type="number" id="workTime" value="25" min="1" max="60">
                </div>
                <div class="time-setting">
                    <label>短休息</label>
                    <input type="number" id="shortBreak" value="5" min="1" max="30">
                </div>
                <div class="time-setting">
                    <label>长休息</label>
                    <input type="number" id="longBreak" value="15" min="1" max="60">
                </div>
            </div>
            <button class="save-settings" onclick="saveSettings()">保存设置</button>
        </div>
    </div>

    <script>
        let timer = null;
        let timeLeft = 25 * 60; // 25分钟
        let totalTime = 25 * 60;
        let isPaused = false;
        let currentSession = 'work'; // work, shortBreak, longBreak
        let pomodoroCount = 0;
        let completedCount = 0;
        let totalFocusTime = 0;
        let totalBreakTime = 0;
        let isWorking = false;

        // 从localStorage加载统计数据
        function loadStats() {
            const savedStats = localStorage.getItem('pomodoroStats');
            if (savedStats) {
                const stats = JSON.parse(savedStats);
                pomodoroCount = stats.pomodoroCount || 0;
                completedCount = stats.completedCount || 0;
                totalFocusTime = stats.totalFocusTime || 0;
                totalBreakTime = stats.totalBreakTime || 0;
                updateStatsDisplay();
            }
        }

        // 保存统计数据
        function saveStats() {
            const stats = {
                pomodoroCount,
                completedCount,
                totalFocusTime,
                totalBreakTime
            };
            localStorage.setItem('pomodoroStats', JSON.stringify(stats));
        }

        // 更新统计显示
        function updateStatsDisplay() {
            document.getElementById('pomodoroCount').textContent = pomodoroCount;
            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('focusTime').textContent = totalFocusTime;
            document.getElementById('breakTime').textContent = totalBreakTime;
        }

        // 更新显示
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // 更新进度环
            const progress = (totalTime - timeLeft) / totalTime;
            const circle = document.querySelector('.progress-ring circle');
            const circumference = 2 * Math.PI * 115;
            const offset = circumference - (progress * circumference);
            circle.style.strokeDashoffset = offset;
        }

        // 开始计时
        function startTimer() {
            if (!isWorking) {
                isWorking = true;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'inline-block';

                timer = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        // 时间到
                        playSound();
                        completeSession();
                    }
                }, 1000);
            }
        }

        // 暂停计时
        function pauseTimer() {
            if (isWorking) {
                isWorking = false;
                clearInterval(timer);
                document.getElementById('startBtn').style.display = 'inline-block';
                document.getElementById('pauseBtn').style.display = 'none';
            }
        }

        // 重置计时
        function resetTimer() {
            pauseTimer();
            resetCurrentSession();
        }

        // 重置当前会话
        function resetCurrentSession() {
            clearInterval(timer);
            isWorking = false;
            timeLeft = totalTime;

            // 更新UI
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';

            // 重置状态
            if (currentSession === 'work') {
                document.getElementById('status').textContent = '准备开始工作';
                document.getElementById('timerCircle').className = 'timer-circle';
            } else if (currentSession === 'shortBreak') {
                document.getElementById('status').textContent = '短休息时间';
                document.getElementById('timerCircle').className = 'timer-circle short-break';
            } else {
                document.getElementById('status').textContent = '长休息时间';
                document.getElementById('timerCircle').className = 'timer-circle long-break';
            }

            updateDisplay();
        }

        // 完成会话
        function completeSession() {
            clearInterval(timer);
            isWorking = false;

            if (currentSession === 'work') {
                completedCount++;
                totalFocusTime += Math.floor(totalTime / 60);
                pomodoroCount++;

                // 每完成4个番茄钟，进行长休息
                if (pomodoroCount % 4 === 0) {
                    currentSession = 'longBreak';
                    totalTime = 15 * 60;
                    document.getElementById('status').textContent = '完成一个工作周期！享受长休息吧';
                } else {
                    currentSession = 'shortBreak';
                    totalTime = 5 * 60;
                    document.getElementById('status').textContent = '工作完成！休息一下吧';
                }
            } else {
                totalBreakTime += Math.floor(totalTime / 60);
                document.getElementById('status').textContent = '休息结束！准备开始新的工作';
                currentSession = 'work';
                totalTime = parseInt(document.getElementById('workTime').value) * 60;
            }

            // 重置UI
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';

            // 更新圆圈样式
            if (currentSession === 'work') {
                document.getElementById('timerCircle').className = 'timer-circle working';
            } else if (currentSession === 'shortBreak') {
                document.getElementById('timerCircle').className = 'timer-circle short-break';
            } else {
                document.getElementById('timerCircle').className = 'timer-circle long-break';
            }

            timeLeft = totalTime;
            updateDisplay();
            updateStatsDisplay();
            saveStats();
        }

        // 播放声音
        function playSound() {
            const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSl+yvDPfjMGHm7A7+OZURE');
            audio.play();
        }

        // 保存设置
        function saveSettings() {
            const workTime = parseInt(document.getElementById('workTime').value);
            const shortBreak = parseInt(document.getElementById('shortBreak').value);
            const longBreak = parseInt(document.getElementById('longBreak').value);

            if (workTime < 1 || workTime > 60 || shortBreak < 1 || shortBreak > 30 || longBreak < 1 || longBreak > 60) {
                alert('请输入有效的时间范围');
                return;
            }

            if (!isWorking) {
                totalTime = workTime * 60;
                timeLeft = totalTime;
                updateDisplay();
            }

            // 保存到localStorage
            localStorage.setItem('pomodoroSettings', JSON.stringify({
                workTime,
                shortBreak,
                longBreak
            }));

            // 显示保存成功提示
            const saveBtn = document.querySelector('.save-settings');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = '已保存！';
            saveBtn.style.background = '#48bb78';
            setTimeout(() => {
                saveBtn.textContent = originalText;
                saveBtn.style.background = '#5a67d8';
            }, 2000);
        }

        // 加载设置
        function loadSettings() {
            const savedSettings = localStorage.getItem('pomodoroSettings');
            if (savedSettings) {
                const settings = JSON.parse(savedSettings);
                document.getElementById('workTime').value = settings.workTime || 25;
                document.getElementById('shortBreak').value = settings.shortBreak || 5;
                document.getElementById('longBreak').value = settings.longBreak || 15;

                totalTime = parseInt(settings.workTime || 25) * 60;
                timeLeft = totalTime;
            }
        }

        // 初始化
        window.onload = function() {
            loadStats();
            loadSettings();
            updateDisplay();
            document.getElementById('timerCircle').className = 'timer-circle working';
        };

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!isWorking) {
                    startTimer();
                } else {
                    pauseTimer();
                }
            } else if (e.code === 'KeyR') {
                e.preventDefault();
                resetTimer();
            }
        });
    </script>
</body>
</html>
